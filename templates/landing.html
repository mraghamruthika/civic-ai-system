<!DOCTYPE html>
<html>

<head>
    <title>Civic AI Complaint System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4e73df, #1cc88a);
        }

        .box {
            background: white;
            width: 420px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px 0;
        }

        p {
            color: #555;
            margin: 0 0 25px 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        .user {
            background: #4e73df;
            color: white;
        }

        .admin {
            background: #1cc88a;
            color: white;
        }

        .small {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Civic AI Complaint System</h1>
        <p>Select how you want to login</p>

        <button class="btn user" onclick="window.location.href='/login'">
            User Login
        </button>

        <button class="btn admin" onclick="window.location.href='/admin-login'">
            Admin Login
        </button>

        <div class="small">
            Citizens → submit & track complaints | Admin → update status & manage complaints
        </div>
    </div>
</body>

</html>
