<!DOCTYPE html>
<html>

<head>
    <title>Civic AI Complaint System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
        }

        .card {
            width: 520px;
            max-width: 92%;
            background: #fff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .sub {
            color: #555;
            margin-bottom: 22px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 10px;
        }

        .box {
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #eee;
            text-align: left;
            transition: 0.2s;
        }

        .box:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #4e73df;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .btn.green {
            background: #1cc88a;
        }

        .small {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="title">Civic AI Complaint System</div>
        <div class="sub">Choose how you want to login</div>

        <div class="grid">
            <div class="box">
                <h3 style="margin:0;">User</h3>
                <p class="small">Register and submit complaints with photo proofs.</p>
                <a class="btn green" href="/login">User Login</a>
                <div class="small" style="margin-top:10px;">New user? <a href="/register">Register</a></div>
            </div>

            <div class="box">
                <h3 style="margin:0;">Admin</h3>
                <p class="small">Login with email to manage department complaints.</p>
                <a class="btn" href="/admin/login">Admin Login</a>
                <div class="small" style="margin-top:10px;">New admin? <a href="/admin/register">Register</a></div>
            </div>
        </div>
    </div>
</body>

</html>
