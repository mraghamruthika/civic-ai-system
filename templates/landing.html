<!DOCTYPE html>
<html>

<head>
    <title>Choose Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .2);
            text-align: center;
        }

        h1 {
            margin: 0 0 8px;
            color: #111827;
        }

        p {
            color: #6b7280;
            margin: 0 0 18px;
        }

        .btn {
            display: block;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            margin: 12px 0;
        }

        .user {
            background: #2563eb;
            color: #fff;
        }

        .admin {
            background: #111827;
            color: #fff;
        }

        .btn:hover {
            opacity: .92;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Civic AI Complaint System</h1>
        <p>Select how you want to login</p>

        <a class="btn user" href="/login">User Login</a>
        <a class="btn admin" href="/admin/login">Admin Login</a>

        <p style="margin-top:18px;">
            New user? <a href="/register">Register</a> |
            New admin? <a href="/admin/register">Admin Register</a>
        </p>
    </div>
</body>

</html>
