<!DOCTYPE html>
<html>

<head>
    <title>Complaint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            max-width: 760px;
            width: 100%;
            padding: 26px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .22);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .welcome {
            font-weight: 900;
            color: #111827;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 12px;
            color: #fff;
            font-weight: 900;
            text-decoration: none;
        }

        .btn-blue {
            background: #2563eb;
        }

        .btn-red {
            background: #ef4444;
        }

        h2 {
            margin: 10px 0;
            color: #111827;
        }

        label {
            display: block;
            font-weight: 900;
            margin-top: 12px;
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-weight: 800;
            min-height: 90px;
            resize: vertical;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .submit {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            border: 0;
            border-radius: 12px;
            background: #111827;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            color: #0f172a;
            font-weight: 900;
        }

        .res {
            margin-top: 10px;
            padding: 12px;
            border-radius: 12px;
            background: #f3f4f6;
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="top">
            <div class="welcome">Welcome, {{ username }}</div>
            <div class="btn-group">
                <a class="btn btn-blue" href="/my-complaints">My Complaints</a>
                <a class="btn btn-red" href="/logout">Logout</a>
            </div>
        </div>

        <h2>Submit a Complaint</h2>

        {% if dept_message %}
        <div class="msg">{{ dept_message }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            <label>Complaint Description</label>
            <textarea name="complaint" required></textarea>

            <label>Problem Location (where issue happened)</label>
            <div class="grid">
                <div>
                    <label>District</label>
                    <select name="incident_district" id="d" required>
                        {% for di in districts %}
                        <option value="{{ di }}">{{ di }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Taluk</label>
                    <select name="incident_taluk" id="t" required></select>
                </div>
            </div>

            <label>Area / Street / Landmark</label>
            <input name="incident_area" placeholder="Eg: near bus stop, 2nd street..." required>

            <label>Upload Proof Images (2)</label>
            <input type="file" name="photo1" accept="image/*" required>
            <input type="file" name="photo2" accept="image/*" required>

            <button class="submit" type="submit">Submit</button>
        </form>

        {% if prediction %}
        <div class="res">
            Predicted Category: {{ prediction }} <br>
            Priority: {{ priority }}
        </div>
        {% endif %}
    </div>

    <script>
        const TN = {{ tn| tojson }};
        const d = document.getElementById('d');
        const t = document.getElementById('t');

        function fillTaluk() {
            t.innerHTML = '';
            (TN[d.value] || []).forEach(x => {
                const o = document.createElement('option');
                o.value = x;
                o.textContent = x;
                t.appendChild(o);
            });
        }

        d.addEventListener('change', fillTaluk);
        fillTaluk();
    </script>
</body>

</html>
