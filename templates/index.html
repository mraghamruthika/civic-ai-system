<!DOCTYPE html>
<html>

<head>
    <title>Civic AI Complaint System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 14px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0px 4px 22px rgba(0, 0, 0, 0.2);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .welcome {
            font-weight: 800;
            color: #111827;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-blue {
            background: #2563eb;
            color: white;
        }

        .btn-red {
            background: #ef4444;
            color: white;
        }

        h1 {
            margin: 8px 0 0;
            color: #111827;
        }

        label {
            font-weight: 800;
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            color: #111827;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #111827;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .filebox {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }

        .tip {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
        }

        .submit {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            background: #111827;
            color: white;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            border: none;
        }

        .submit:hover {
            opacity: 0.95;
        }

        .result {
            margin-top: 18px;
            padding: 14px;
            border-radius: 12px;
            background: #f3f4f6;
            font-weight: 800;
            color: #111827;
        }

        .msg {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            color: #0f172a;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="welcome">Welcome, {{ username }}</div>
            <div class="actions">
                <a class="btn btn-blue" href="/my-complaints">My Complaints</a>
                <a class="btn btn-red" href="/logout">Logout</a>
            </div>
        </div>

        <h1>AI Civic Complaint System</h1>

        {% if dept_message %}
        <div class="msg">{{ dept_message }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            <label>Complaint Description</label>
            <textarea name="complaint" placeholder="Enter your complaint..." required></textarea>

            <label>Upload Proof Images (2)</label>
            <div class="filebox">
                <input type="file" name="photo1" accept="image/*" required />
            </div>
            <div class="filebox">
                <input type="file" name="photo2" accept="image/*" required />
            </div>
            <div class="tip">Tip: Use clear photos for better verification.</div>

            <button class="submit" type="submit">Submit Complaint</button>
        </form>

        {% if prediction %}
        <div class="result">
            Predicted Category: {{ prediction }} <br />
            Priority: {{ priority }}
        </div>
        {% endif %}
    </div>
</body>

</html>
