<!DOCTYPE html>
<html>

<head>
    <title>Civic AI Complaint System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0px 10px 28px rgba(0, 0, 0, 0.18);
            margin-top: 30px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .welcome {
            font-weight: 900;
            color: #111827;
            font-size: 16px;
        }

        .actions a {
            text-decoration: none;
            font-weight: 900;
            padding: 10px 12px;
            border-radius: 12px;
            margin-left: 8px;
            display: inline-block;
        }

        .btn-dark {
            background: #111827;
            color: white;
        }

        .btn-red {
            background: #ef4444;
            color: white;
        }

        .btn-blue {
            background: #2563eb;
            color: white;
        }

        h2 {
            margin: 0 0 12px 0;
            color: #111827;
        }

        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            margin-top: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #111827;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            margin-top: 12px;
        }

        button:hover {
            opacity: 0.93;
        }

        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            background: #f3f4f6;
            font-weight: 800;
            color: #111827;
        }

        .msg-green {
            margin-top: 14px;
            padding: 12px;
            border-radius: 12px;
            background: #dcfce7;
            font-weight: 900;
            color: #166534;
        }

        .msg-red {
            margin-top: 14px;
            padding: 12px;
            border-radius: 12px;
            background: #fee2e2;
            font-weight: 900;
            color: #991b1b;
        }

        .hint {
            margin-top: 8px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topbar">
            <div class="welcome">Welcome, {{ username }}</div>
            <div class="actions">
                <a class="btn-blue" href="/my-complaints">My Complaints</a>
                <a class="btn-red" href="/logout">Logout</a>
            </div>
        </div>

        <h2>AI Civic Complaint System</h2>

        <form method="POST" enctype="multipart/form-data">
            <label><b>Complaint Description</b></label>
            <textarea name="complaint" rows="4" placeholder="Enter your complaint..." required></textarea>

            <label style="display:block; margin-top:10px;"><b>Upload Proof Images (2)</b></label>
            <input type="file" name="photo1" accept="image/*" required>
            <input type="file" name="photo2" accept="image/*" required>

            <div class="hint">Tip: Use clear photos for better verification.</div>

            <button type="submit">Submit Complaint</button>
        </form>

        {% if error %}
        <div class="msg-red">{{ error }}</div>
        {% endif %}

        {% if dept_message %}
        <div class="msg-green">{{ dept_message }}</div>
        {% endif %}

        {% if prediction %}
        <div class="result">
            Category: <b>{{ prediction }}</b><br>
            Priority: <b>{{ priority }}</b>
        </div>
        {% endif %}

    </div>

</body>

</html>
