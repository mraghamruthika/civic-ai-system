<!DOCTYPE html>
<html>

<head>
    <title>Admin Verify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .box {
            background: #fff;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 26px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }

        h2 {
            margin: 0 0 6px;
            color: #111827;
        }

        p {
            margin: 0 0 10px;
            color: #6b7280;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            margin-top: 6px;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        .otp {
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            padding: 10px;
            border-radius: 12px;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .err {
            background: #fee2e2;
            border: 1px solid #fecaca;
            padding: 10px;
            border-radius: 12px;
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Verify Admin (OTP)</h2>
        <p>Enter the OTP to activate admin account</p>

        <div class="otp">Demo OTP: {{ otp_demo }}</div>
        {% if msg %}<div class="err">{{ msg }}</div><br>{% endif %}

        <form method="POST">
            <input name="otp" placeholder="Enter OTP" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>

</html>
