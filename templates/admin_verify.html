<!DOCTYPE html>
<html>

<head>
    <title>Admin Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 460px;
            max-width: 92%;
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1cc88a;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: #17a673;
        }

        .msg {
            color: #b00020;
            margin-top: 10px;
        }

        .otp-demo {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #f6f7fb;
            font-size: 13px;
            color: #333;
        }

        a {
            color: #2e59d9;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Admin OTP Verification</h2>
        <p style="color:#555;margin-top:6px;">Enter the OTP to verify your admin account.</p>

        {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}

        <form method="POST">
            <input name="otp" placeholder="Enter 6-digit OTP" required>
            <button type="submit">Verify</button>
        </form>

        <!-- Demo OTP (since SMS/Email not integrated) -->
        {% if otp_demo %}
        <div class="otp-demo"><b>Demo OTP:</b> {{ otp_demo }}</div>
        {% endif %}

        <p style="margin-top:14px;"><a href="/">Back</a></p>
    </div>
</body>

</html>
