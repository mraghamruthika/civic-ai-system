<!DOCTYPE html>
<html>

<head>
    <title>Admin Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 460px;
            max-width: 92%;
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
        }

        h2 {
            margin: 0 0 6px 0;
            text-align: center;
        }

        p.sub {
            margin: 0 0 16px 0;
            text-align: center;
            color: #555;
        }

        label {
            font-weight: 700;
            display: block;
            margin-top: 12px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 6px;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4e73df;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: #2e59d9;
        }

        .msg {
            color: #b00020;
            text-align: center;
            margin-top: 10px;
        }

        .small {
            text-align: center;
            margin-top: 14px;
            color: #555;
        }

        a {
            color: #2e59d9;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Admin Registration</h2>
        <p class="sub">Create admin account (email + verification OTP)</p>

        {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}

        <form method="POST">
            <label>Name</label>
            <input name="name" placeholder="Admin name" required>

            <label>Department</label>
            <select name="department" required>
                <option value="roads">Roads</option>
                <option value="water">Water</option>
                <option value="drainage">Drainage</option>
                <option value="sanitation">Sanitation</option>
                <option value="electricity">Electricity</option>
                <option value="streetlights">Street Lights</option>
                <option value="health">Health</option>
                <option value="animals">Animals</option>
                <option value="emergency">Emergency</option>
                <option value="general">General</option>
            </select>

            <label>Email</label>
            <input name="email" placeholder="admin@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <button type="submit">Register</button>
        </form>

        <div class="small">
            Already registered? <a href="/admin/login">Admin Login</a> • <a href="/">Back</a>
        </div>
    </div>
</body>

</html>
