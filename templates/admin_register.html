<!DOCTYPE html>
<html>

<head>
    <title>Admin Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        h2 {
            margin: 0 0 6px;
            color: #111827;
        }

        .sub {
            color: #6b7280;
            margin: 0 0 16px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #d1d5db;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 12px;
            background: #111827;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.93;
        }

        .msg {
            color: #ef4444;
            font-weight: 800;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Admin Registration</h2>
        <p class="sub">Create admin account (demo OTP verification)</p>
        {% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
        <form method="POST">
            <input name="name" placeholder="Admin Name" required>
            <input name="email" placeholder="Admin Email" type="email" required>
            <input name="phone" placeholder="Phone Number" required>
            <input name="password" placeholder="Password" type="password" required>
            <button type="submit">Register</button>
        </form>
        <p style="margin-top:12px;">Already have admin account? <a href="/admin/login">Login</a></p>
    </div>
</body>

</html>
