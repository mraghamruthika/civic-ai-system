<!DOCTYPE html>
<html>

<head>
    <title>Admin Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .box {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 16px;
            padding: 26px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }

        h2 {
            margin: 0 0 6px;
            color: #111827;
        }

        p {
            margin: 0 0 18px;
            color: #6b7280;
            font-weight: 700;
        }

        label {
            font-weight: 900;
            color: #111827;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            margin-top: 6px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        button:hover {
            opacity: .92;
        }

        a {
            color: #2563eb;
            font-weight: 900;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Admin Registration</h2>
        <p>Register admin account (OTP verification demo)</p>

        <form method="POST">
            <label>Name</label>
            <input name="name" placeholder="Admin name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="admin@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <button type="submit">Register</button>
        </form>

        <div style="margin-top:14px; text-align:center;">
            Already registered? <a href="/admin/login">Login</a><br>
            Back to <a href="/">Login choice</a>
        </div>
    </div>
</body>

</html>
