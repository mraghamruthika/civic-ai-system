<!DOCTYPE html>
<html>

<head>
    <title>Choose Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 26px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .22);
            text-align: center;
        }

        h2 {
            margin: 0 0 8px;
            color: #111827;
        }

        .sub {
            color: #6b7280;
            font-weight: 800;
            margin-bottom: 18px;
        }

        a {
            display: block;
            text-decoration: none;
            font-weight: 900;
            padding: 14px;
            border-radius: 12px;
            margin: 10px 0;
        }

        .u {
            background: #111827;
            color: #fff;
        }

        .a {
            background: #2563eb;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Civic AI Complaint System</h2>
        <div class="sub">Tamil Nadu – Department + Taluk Routing</div>
        <a class="u" href="/login">User Login</a>
        <a class="a" href="/admin/login">Admin / Head Login</a>
    </div>
</body>

</html>
