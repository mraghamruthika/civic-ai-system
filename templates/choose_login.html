<!DOCTYPE html>
<html>

<head>
    <title>Choose Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 16px;
            padding: 26px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            text-align: center;
        }

        h1 {
            margin: 0 0 6px;
            color: #111827;
        }

        p {
            margin: 0 0 18px;
            color: #6b7280;
            font-weight: 700;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        a {
            text-decoration: none;
            font-weight: 900;
            padding: 14px 18px;
            border-radius: 14px;
            display: inline-block;
            min-width: 180px;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, .18);
        }

        .user {
            background: #2563eb;
            color: #fff;
        }

        .admin {
            background: #111827;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Civic AI Complaint System</h1>
        <p>Select how you want to login</p>
        <div class="row">
            <a class="user" href="/login">User Login</a>
            <a class="admin" href="/admin/login">Admin Login</a>
        </div>
        <div style="margin-top:18px; color:#6b7280; font-weight:700;">
            New user? <a href="/register">Register</a> |
            New admin? <a href="/admin/register">Register</a>
        </div>
    </div>
</body>

</html>
