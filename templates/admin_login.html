<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #222;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .msg {
            color: crimson;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Admin Login</h2>
        {% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
        <form method="POST">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter admin password" required>
            <button type="submit">Login</button>
        </form>
        <p style="font-size:12px;color:#555;">Demo default: admin123 (change in Render ENV)</p>
    </div>
</body>

</html>
