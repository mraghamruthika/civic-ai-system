<!DOCTYPE html>
<html>

<head>
    <title>Admin / Head Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 26px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .22);
        }

        h2 {
            margin: 0 0 8px;
            color: #111827;
        }

        .sub {
            color: #6b7280;
            font-weight: 800;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 900;
            margin-top: 12px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-weight: 800;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            border: 0;
            border-radius: 12px;
            background: #111827;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            font-weight: 900;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-weight: 900;
        }

        a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Admin / Head Login</h2>
        <div class="sub">Login using email and password.</div>
        {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
        <form method="POST">
            <label>Email</label><input name="email" type="email" required>
            <label>Password</label><input name="password" type="password" required>
            <button type="submit">Login</button>
        </form>
        <div class="row">
            <a href="/admin/register">Register</a>
            <a href="/admin/forgot">Forgot password?</a>
        </div>
    </div>
</body>

</html>
