<!DOCTYPE html>
<html>

<head>
    <title>Department Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial; padding:15px;">
    <h2>{{ dept_name }} Department Dashboard</h2>

    {% if complaints|length == 0 %}
    <p>No complaints yet.</p>
    {% else %}
    {% for c in complaints %}
    <div style="border:1px solid #ccc; padding:12px; margin:12px 0; border-radius:10px;">
        <b>ID:</b> {{ c[0] }} <br>
        <b>Name:</b> {{ c[1] }} <br>
        <b>Area:</b> {{ c[2] }} <br>
        <b>Complaint:</b> {{ c[3] }} <br>
        <b>Category:</b> {{ c[4] }} <br>
        <b>Priority:</b> {{ c[5] }} <br>
        <b>Time:</b> {{ c[8] }} <br><br>

        <img src="/{{ c[6] }}" style="max-width:100%; height:auto; border-radius:8px;"><br><br>
        <img src="/{{ c[7] }}" style="max-width:100%; height:auto; border-radius:8px;">
    </div>
    {% endfor %}
    {% endif %}
</body>

</html>
